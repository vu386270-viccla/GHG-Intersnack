<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 520" width="290" height="260">
  <!-- Red rounded square background (the icon portion) -->
  <rect x="170" y="10" width="240" height="230" rx="46" ry="46" fill="#C9281B"/>

  <!-- 
    Intersnack flower logo: 4 rounded petals forming a clover/flower shape
    Each petal is like a rounded teardrop pointing toward center
    Using the "infinity loop" / figure-8 technique for each axis
  -->
  <g transform="translate(290,125)">
    <!-- We draw each petal as a closed bezier curve -->
    <!-- Petal top-left -->
    <path d="
      M 0 0
      C -10 -15, -55 -15, -55 -50
      C -55 -85, -20 -95, 0 -75
      C 20 -55, 10 -15, 0 0 Z
    " fill="white" transform="rotate(-30)"/>
    <!-- Petal top-right -->
    <path d="
      M 0 0
      C 10 -15, 55 -15, 55 -50
      C 55 -85, 20 -95, 0 -75
      C -20 -55, -10 -15, 0 0 Z
    " fill="white" transform="rotate(30)"/>
    <!-- Petal bottom-left -->
    <path d="
      M 0 0
      C -10 15, -55 15, -55 50
      C -55 85, -20 95, 0 75
      C 20 55, 10 15, 0 0 Z
    " fill="white" transform="rotate(30)"/>
    <!-- Petal bottom-right -->
    <path d="
      M 0 0
      C 10 15, 55 15, 55 50
      C 55 85, 20 95, 0 75
      C -20 55, -10 15, 0 0 Z
    " fill="white" transform="rotate(-30)"/>
  </g>

  <!-- Wordmark: "Intersnack" in brownish-gray, serif -->
  <text
    x="290"
    y="430"
    font-family="Georgia, 'Book Antiqua', Palatino, serif"
    font-size="105"
    fill="#5A3B30"
    text-anchor="middle"
    letter-spacing="-2"
  >Intersnack</text>
</svg>
